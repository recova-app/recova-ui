openapi: 3.1.0
info:
  title: Recova Backend API
  version: 0.2.0
  description: Public API contract for the Go Fiber Recova Backend runtime.
servers:
  - url: /
    description: Base URL runtime service
paths:
  /health/live:
    get:
      tags:
        - health
      operationId: getHealthLive
      summary: Check service liveness status
      responses:
        '200':
          description: Service is live
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                success:
                  value:
                    success: true
                    message: Service is live
                    data:
                      status: ok
                    meta: null
  /health/ready:
    get:
      tags:
        - health
      operationId: getHealthReady
      summary: Check service dependency readiness
      responses:
        '200':
          description: Service is ready to accept requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                ready:
                  value:
                    success: true
                    message: Service is ready
                    data:
                      status: ready
                      checks:
                        database:
                          status: ok
                          healthy: true
                          message: Database connection is healthy
                    meta: null
        '503':
          description: Service is not ready yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                not_ready:
                  value:
                    success: false
                    message: Layanan belum siap
                    data: null
                    error:
                      code: SERVICE_UNAVAILABLE
                      details: null
                      request_id: req_health_ready_503
  /metrics:
    get:
      tags:
        - observability
      operationId: getMetrics
      summary: Expose runtime metrics in Prometheus format
      responses:
        '200':
          description: Runtime metrics in text/plain format
          content:
            text/plain:
              schema:
                type: string
  /openapi.yaml:
    get:
      tags:
        - docs
      operationId: getOpenAPIArtifact
      summary: Expose generated OpenAPI YAML artifact for documentation tooling
      responses:
        '200':
          description: OpenAPI YAML document is available
          content:
            application/yaml:
              schema:
                type: string
        '503':
          description: OpenAPI document is not available at runtime
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                openapi_unavailable:
                  value:
                    success: false
                    message: Dokumen OpenAPI belum tersedia
                    data: null
                    error:
                      code: SERVICE_UNAVAILABLE
                      details: null
                      request_id: req_openapi_503
  /docs/api:
    get:
      tags:
        - docs
      operationId: getScalarAPIReference
      summary: Serve interactive Scalar API reference page
      responses:
        '200':
          description: Scalar API reference HTML page
          content:
            text/html:
              schema:
                type: string
        '500':
          description: Failed to render documentation page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                docs_render_failed:
                  value:
                    success: false
                    message: Dokumentasi API gagal dimuat
                    data: null
                    error:
                      code: INTERNAL_ERROR
                      details: null
                      request_id: req_docs_500
  /api/v1/auth/google:
    post:
      tags:
        - auth
      operationId: postAuthGoogle
      summary: Login or register user via Google token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthGoogleLoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                login_success:
                  value:
                    success: true
                    message: Login berhasil
                    data:
                      user:
                        id: user_123
                        email: user@example.com
                        nickname: pejuang_pulih
                        recovery_reason: Ingin hidup lebih terarah
                        daily_checkin_time: "09:00"
                        onboarding_completed: true
                      session:
                        access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.mock
                        token_type: Bearer
                        expires_in: 900
                    meta: null
        '401':
          description: Google token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                google_token_invalid:
                  value:
                    success: false
                    message: Token Google tidak valid
                    data: null
                    error:
                      code: UNAUTHENTICATED
                      details: null
                      request_id: req_auth_google_401
        '422':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_payload:
                  value:
                    success: false
                    message: Token Google wajib diisi
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      details:
                        - field: token
                          message: Token Google wajib diisi
                      request_id: req_auth_google_422
  /api/v1/auth/register:
    post:
      tags:
        - auth
      operationId: postAuthRegister
      summary: Register a manual account using email, username, and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthManualRegisterRequest'
      responses:
        '201':
          description: Registration succeeded and an active session was issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                register_success:
                  value:
                    success: true
                    message: Registrasi berhasil
                    data:
                      user:
                        id: user_456
                        email: manual@example.com
                        nickname: pejuang_manual
                        recovery_reason: null
                        daily_checkin_time: null
                        onboarding_completed: false
                      session:
                        access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.manual
                        token_type: Bearer
                        expires_in: 900
                    meta: null
        '409':
          description: Email or username is already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                email_conflict:
                  value:
                    success: false
                    message: Email sudah digunakan
                    data: null
                    error:
                      code: CONFLICT
                      details:
                        field: email
                        message: Email sudah digunakan
                      request_id: req_auth_register_409_email
                username_conflict:
                  value:
                    success: false
                    message: Username sudah digunakan
                    data: null
                    error:
                      code: CONFLICT
                      details:
                        field: username
                        message: Username sudah digunakan
                      request_id: req_auth_register_409_username
        '422':
          description: Invalid registration payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                password_mismatch:
                  value:
                    success: false
                    message: Konfirmasi password tidak cocok
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      details:
                        - field: confirm_password
                          message: Konfirmasi password tidak cocok
                      request_id: req_auth_register_422_mismatch
                invalid_payload:
                  value:
                    success: false
                    message: Password minimal 8 karakter
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      details:
                        - field: password
                          message: Password minimal 8 karakter
                      request_id: req_auth_register_422_password
        '500':
          description: Failed to create manual account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                register_internal_error:
                  value:
                    success: false
                    message: Gagal memproses registrasi
                    data: null
                    error:
                      code: INTERNAL_ERROR
                      details: null
                      request_id: req_auth_register_500
  /api/v1/auth/login:
    post:
      tags:
        - auth
      operationId: postAuthLogin
      summary: Log in to a manual account using email or username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthManualLoginRequest'
      responses:
        '200':
          description: Manual login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                login_success:
                  value:
                    success: true
                    message: Login berhasil
                    data:
                      user:
                        id: user_456
                        email: manual@example.com
                        nickname: pejuang_manual
                        recovery_reason: null
                        daily_checkin_time: null
                        onboarding_completed: false
                      session:
                        access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.manual_login
                        token_type: Bearer
                        expires_in: 900
                    meta: null
        '401':
          description: Account not found or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                account_not_found:
                  value:
                    success: false
                    message: Akun tidak ditemukan
                    data: null
                    error:
                      code: UNAUTHENTICATED
                      details: null
                      request_id: req_auth_login_401_not_found
                wrong_password:
                  value:
                    success: false
                    message: Kredensial login tidak sesuai
                    data: null
                    error:
                      code: UNAUTHENTICATED
                      details: null
                      request_id: req_auth_login_401_password
        '422':
          description: Invalid login payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_payload:
                  value:
                    success: false
                    message: Identifier login wajib diisi
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      details:
                        - field: identifier
                          message: Identifier login wajib diisi
                      request_id: req_auth_login_422_identifier
        '500':
          description: Failed to process login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                login_internal_error:
                  value:
                    success: false
                    message: Gagal memproses login
                    data: null
                    error:
                      code: INTERNAL_ERROR
                      details: null
                      request_id: req_auth_login_500
  /api/v1/auth/onboarding:
    post:
      tags:
        - onboarding
      operationId: postAuthOnboarding
      summary: Save initial user onboarding data
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingRequest'
      responses:
        '201':
          description: Onboarding data saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                created:
                  value:
                    success: true
                    message: Data onboarding berhasil disimpan
                    data:
                      id: user_123
                      email: user@example.com
                      nickname: pejuang_pulih
                      recovery_reason: Ingin kembali fokus hidup sehat
                      daily_checkin_time: "09:00"
                      onboarding_completed: true
                    meta: null
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                unauthenticated:
                  value:
                    success: false
                    message: Autentikasi dibutuhkan
                    data: null
                    error:
                      code: UNAUTHENTICATED
                      details: null
                      request_id: req_onboarding_401
        '409':
          description: Onboarding already completed with different data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                conflict:
                  value:
                    success: false
                    message: Data onboarding sudah tersimpan dengan nilai berbeda
                    data: null
                    error:
                      code: CONFLICT
                      details: null
                      request_id: req_onboarding_409
        '422':
          description: Invalid onboarding payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_payload:
                  value:
                    success: false
                    message: Waktu check-in harian wajib diisi
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      details:
                        - field: daily_checkin_time
                          message: Waktu check-in harian wajib diisi
                      request_id: req_onboarding_422
  /api/v1/auth/refresh:
    post:
      tags:
        - auth
      operationId: postAuthRefresh
      summary: Rotates the refresh token and issues a new access token.
      security:
        - RefreshCookieAuth: []
      responses:
        '200':
          description: Session refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                refresh_success:
                  value:
                    success: true
                    message: Sesi berhasil diperbarui
                    data:
                      user:
                        id: user_123
                        email: user@example.com
                        nickname: pejuang_pulih
                        recovery_reason: Ingin hidup lebih terarah
                        daily_checkin_time: "09:00"
                        onboarding_completed: true
                      session:
                        access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refreshed
                        token_type: Bearer
                        expires_in: 900
                    meta: null
        '401':
          description: Refresh token is invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_session:
                  value:
                    success: false
                    message: Sesi login tidak valid
                    data: null
                    error:
                      code: UNAUTHENTICATED
                      details: null
                      request_id: req_auth_refresh_401
  /api/v1/auth/logout:
    post:
      tags:
        - auth
      operationId: postAuthLogout
      summary: End current user session
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                logout_success:
                  value:
                    success: true
                    message: Logout berhasil
                    data:
                      logged_out: true
                    meta: null
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                unauthenticated:
                  value:
                    success: false
                    message: Autentikasi dibutuhkan
                    data: null
                    error:
                      code: UNAUTHENTICATED
                      details: null
                      request_id: req_auth_logout_401
  /api/v1/users/me:
    get:
      tags:
        - users
      operationId: getUsersMe
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                user_profile:
                  value:
                    success: true
                    message: Profil pengguna berhasil diambil
                    data:
                      id: user_123
                      email: user@example.com
                      nickname: pejuang_pulih
                      recovery_reason: Ingin hidup lebih terarah
                      daily_checkin_time: "09:00"
                      onboarding_completed: true
                    meta: null
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                unauthenticated:
                  value:
                    success: false
                    message: Autentikasi dibutuhkan
                    data: null
                    error:
                      code: UNAUTHENTICATED
                      details: null
                      request_id: req_users_me_401
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                user_not_found:
                  value:
                    success: false
                    message: Pengguna tidak ditemukan
                    data: null
                    error:
                      code: NOT_FOUND
                      details: null
                      request_id: req_users_me_404
  /api/v1/users/settings:
    put:
      tags:
        - users
      operationId: putUsersSettings
      summary: Update user profile settings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsUpdateRequest'
      responses:
        '200':
          description: User settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                settings_updated:
                  value:
                    success: true
                    message: Pengaturan pengguna berhasil diperbarui
                    data:
                      id: user_123
                      email: user@example.com
                      nickname: pejuang_baru
                      recovery_reason: Fokus bertumbuh
                      daily_checkin_time: "07:30"
                      onboarding_completed: true
                    meta: null
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                unauthenticated:
                  value:
                    success: false
                    message: Autentikasi dibutuhkan
                    data: null
                    error:
                      code: UNAUTHENTICATED
                      details: null
                      request_id: req_users_settings_401
        '422':
          description: Invalid update payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_payload:
                  value:
                    success: false
                    message: Payload update kosong
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      details:
                        - field: payload
                          message: Payload update kosong
                      request_id: req_users_settings_422
  /api/v1/users/me/reset-data:
    delete:
      tags:
        - users
      operationId: deleteUsersMeResetData
      summary: Reset user data for development purposes
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User data reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                reset_success:
                  value:
                    success: true
                    message: Data pengguna berhasil direset
                    data:
                      reset: true
                    meta: null
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                unauthenticated:
                  value:
                    success: false
                    message: Autentikasi dibutuhkan
                    data: null
                    error:
                      code: UNAUTHENTICATED
                      details: null
                      request_id: req_users_reset_401
        '403':
          description: Reset endpoint is not allowed in this environment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                forbidden:
                  value:
                    success: false
                    message: Endpoint reset data hanya tersedia di lingkungan development
                    data: null
                    error:
                      code: FORBIDDEN
                      details: null
                      request_id: req_users_reset_403
  /api/v1/routine/checkin:
    post:
      tags:
        - routine
      operationId: postRoutineCheckin
      summary: Save user daily check-in
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoutineCheckInRequest'
      responses:
        '200':
          description: Daily check-in saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                checkin_success:
                  value:
                    success: true
                    message: Check-in berhasil
                    data:
                      check_in:
                        id: checkin_123
                        user_id: user_123
                        check_in_date: "2026-05-10"
                        mood: tenang
                        is_successful: true
                        commitment: Tetap konsisten
                        created_at: "2026-05-10T09:00:00Z"
                      statistics:
                        current_streak: 5
                        longest_streak: 12
                        total_checkins: 24
                        streak_calendar: ["2026-05-08", "2026-05-09", "2026-05-10"]
                        relapse_count: 3
                        relapse_rate: 0.12
                        recovery_success_rate: 0.88
                        checkin_consistency_score: 84.5
                        weekly_progress:
                          window_days: 7
                          current_successful_checkins: 6
                          previous_successful_checkins: 5
                          delta: 1
                          delta_rate: 0.2
                        monthly_progress:
                          window_days: 30
                          current_successful_checkins: 24
                          previous_successful_checkins: 20
                          delta: 4
                          delta_rate: 0.2
                        mood_trend:
                          - date: "2026-05-10"
                            dominant_mood: tenang
                            successful_ratio: 1
                    meta: null
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                unauthenticated:
                  value:
                    success: false
                    message: Autentikasi dibutuhkan
                    data: null
                    error:
                      code: UNAUTHENTICATED
                      details: null
                      request_id: req_routine_checkin_401
        '409':
          description: User already checked in on the same UTC day
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                conflict:
                  value:
                    success: false
                    message: Pengguna sudah melakukan check-in hari ini
                    data: null
                    error:
                      code: CONFLICT
                      details: null
                      request_id: req_routine_checkin_409
        '422':
          description: Invalid check-in payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_payload:
                  value:
                    success: false
                    message: Mood wajib diisi
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      details:
                        - field: mood
                          message: Mood wajib diisi
                      request_id: req_routine_checkin_422
  /api/v1/routine/statistics:
    get:
      tags:
        - routine
      operationId: getRoutineStatistics
      summary: Get user check-in statistics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Routine statistics fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                statistics_success:
                  value:
                    success: true
                    message: Statistik berhasil diambil
                    data:
                      current_streak: 5
                      longest_streak: 12
                      total_checkins: 24
                      streak_calendar: ["2026-05-08", "2026-05-09", "2026-05-10"]
                      relapse_count: 3
                      relapse_rate: 0.12
                      recovery_success_rate: 0.88
                      checkin_consistency_score: 84.5
                      weekly_progress:
                        window_days: 7
                        current_successful_checkins: 6
                        previous_successful_checkins: 5
                        delta: 1
                        delta_rate: 0.2
                      monthly_progress:
                        window_days: 30
                        current_successful_checkins: 24
                        previous_successful_checkins: 20
                        delta: 4
                        delta_rate: 0.2
                      mood_trend:
                        - date: "2026-05-10"
                          dominant_mood: tenang
                          successful_ratio: 1
                    meta: null
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                unauthenticated:
                  value:
                    success: false
                    message: Autentikasi dibutuhkan
                    data: null
                    error:
                      code: UNAUTHENTICATED
                      details: null
                      request_id: req_routine_statistics_401
  /api/v1/routine/statistics/activity-summary:
    get:
      tags:
        - routine
      operationId: getRoutineActivitySummary
      summary: Get periodic user activity summary
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: window_days
          required: false
          schema:
            type: integer
            minimum: 7
            maximum: 90
      responses:
        '200':
          description: Activity summary fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                activity_summary_success:
                  value:
                    success: true
                    message: Ringkasan aktivitas berhasil diambil
                    data:
                      window_days: 30
                      successful_checkins: 24
                      relapses: 3
                      active_days: 27
                      recent_activity:
                        - date: "2026-05-10"
                          type: checkin
                          mood: tenang
                    meta: null
        '401':
          description: Access token is invalid
          content:
