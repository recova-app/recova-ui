components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    RefreshCookieAuth:
      type: apiKey
      in: cookie
      name: recova_refresh
  schemas:
    SuccessEnvelope:
      type: object
      required:
        - success
        - message
        - data
      properties:
        success:
          type: boolean
          const: true
        message:
          type: string
        data:
          anyOf:
            - $ref: '#/components/schemas/HealthLiveData'
            - $ref: '#/components/schemas/HealthReadyData'
            - $ref: '#/components/schemas/AuthResponseData'
            - $ref: '#/components/schemas/UserProfileData'
            - $ref: '#/components/schemas/LogoutResponseData'
            - $ref: '#/components/schemas/ResetResponseData'
            - $ref: '#/components/schemas/RoutineCheckInResponseData'
            - $ref: '#/components/schemas/RoutineStatisticsData'
            - $ref: '#/components/schemas/RoutineActivitySummaryData'
            - type: array
              items:
                $ref: '#/components/schemas/RoutineRelapseData'
            - $ref: '#/components/schemas/JournalData'
            - type: array
              items:
                $ref: '#/components/schemas/JournalData'
            - $ref: '#/components/schemas/CommunityPostData'
            - type: array
              items:
                $ref: '#/components/schemas/CommunityPostData'
            - $ref: '#/components/schemas/CommunityCommentData'
            - $ref: '#/components/schemas/CommunityCommentThreadData'
            - $ref: '#/components/schemas/CommunityReplyData'
            - $ref: '#/components/schemas/CommunityLikeData'
            - $ref: '#/components/schemas/AchievementsCatalogData'
            - $ref: '#/components/schemas/AchievementsProgressData'
            - $ref: '#/components/schemas/AchievementsUnlockedData'
            - type: array
              items:
                $ref: '#/components/schemas/EducationContentData'
            - $ref: '#/components/schemas/DailyContentData'
            - $ref: '#/components/schemas/AIAskCoachData'
            - type: array
              items:
                $ref: '#/components/schemas/AIChatHistoryItemData'
            - $ref: '#/components/schemas/AISummaryData'
            - $ref: '#/components/schemas/AIPersonaPreferenceData'
            - $ref: '#/components/schemas/AIOnboardingAnalysisData'
        meta:
          oneOf:
            - $ref: '#/components/schemas/SuccessMeta'
            - type: 'null'
    ErrorEnvelope:
      type: object
      required:
        - success
        - message
        - data
        - error
      example:
        success: false
        message: Autentikasi dibutuhkan
        data: null
        error:
          code: UNAUTHENTICATED
          details: null
          request_id: req_example_error
      properties:
        success:
          type: boolean
          const: false
        message:
          type: string
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ErrorPayload'
    ErrorPayload:
      type: object
      required:
        - code
        - request_id
      properties:
        code:
          type: string
        details:
          oneOf:
            - $ref: '#/components/schemas/ErrorDetailsObject'
            - type: array
              items:
                $ref: '#/components/schemas/ValidationErrorDetail'
            - type: 'null'
        request_id:
          type: string
    AuthGoogleLoginRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          minLength: 1
    AuthManualRegisterRequest:
      type: object
      required:
        - email
        - username
        - password
        - confirm_password
      properties:
        email:
          type: string
          format: email
          minLength: 5
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: '^[a-z0-9_]+$'
        password:
          type: string
          minLength: 8
          maxLength: 72
        confirm_password:
          type: string
          minLength: 8
          maxLength: 72
    AuthManualLoginRequest:
      type: object
      required:
        - password
      properties:
        identifier:
          type: string
          minLength: 1
          description: Login identifier. Can be an email or a username.
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 1
      anyOf:
        - required: [identifier]
        - required: [email]
        - required: [username]
    OnboardingRequest:
      type: object
      required:
        - nickname
        - recovery_reason
        - daily_checkin_time
      properties:
        nickname:
          type: string
          minLength: 3
          maxLength: 50
        recovery_reason:
          type: string
          minLength: 3
        daily_checkin_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):([0-5][0-9])$'
        answers:
          $ref: '#/components/schemas/OnboardingAnswers'
        dependency_level:
          type: string
    UserSettingsUpdateRequest:
      type: object
      minProperties: 1
      properties:
        nickname:
          type: string
          minLength: 3
          maxLength: 50
        recovery_reason:
          type: string
          minLength: 3
        daily_checkin_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):([0-5][0-9])$'
    RoutineCheckInRequest:
      type: object
      required:
        - mood
        - is_successful
      properties:
        mood:
          type: string
          minLength: 1
          maxLength: 50
        is_successful:
          type: boolean
        commitment:
          type: string
          maxLength: 2000
        content:
          type: string
          maxLength: 2000
    JournalCreateRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 5000
    CommunityCategory:
      type: string
      enum:
        - saran
        - motivasi
        - cerita
        - pertanyaan
        - bantuan
    CommunityCreatePostRequest:
      type: object
      required:
        - content
        - category
      properties:
        title:
          type: string
          maxLength: 120
        content:
          type: string
          minLength: 10
          maxLength: 5000
        category:
          $ref: '#/components/schemas/CommunityCategory'
    CommunityCreateCommentRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 2000
    AchievementsCategory:
      type: string
      enum:
        - streak_milestone
        - checkin_consistency
        - journal_consistency
        - relapse_recovery
        - community_participation
        - onboarding_completion
    AIAskCoachRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 4000
    AIOnboardingAnalysisRequest:
      type: object
      required:
        - answers
      properties:
        answers:
          $ref: '#/components/schemas/OnboardingAnswers'
    OnboardingAnswers:
      type: object
      minProperties: 1
      additionalProperties:
        $ref: '#/components/schemas/OpenAnswerValue'
    OpenAnswerValue:
      oneOf:
        - type: string
        - type: number
        - type: boolean
        - type: array
          items:
            oneOf:
              - type: string
              - type: number
              - type: boolean
        - type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
        - type: 'null'
    SuccessMeta:
      type: object
      properties:
        pagination:
          type: object
          properties:
            limit:
              type: integer
              minimum: 1
            total:
              type: integer
              minimum: 0
            has_more:
              type: boolean
        trace:
          type: object
          minProperties: 1
          properties:
            request_id:
              type: string
            timestamp:
              type: string
              format: date-time
      additionalProperties: false
    ErrorDetailsObject:
      type: object
      minProperties: 1
      additionalProperties:
        $ref: '#/components/schemas/OpenAnswerValue'
    ValidationErrorDetail:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
      additionalProperties: false
    AIPersonaPreferenceRequest:
      type: object
      required:
        - persona
      properties:
        persona:
          type: string
          enum:
            - supportive
            - friendly
            - concise
            - direct
    HealthLiveData:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ok]
    HealthReadyCheck:
      type: object
      required:
        - status
        - healthy
        - message
      properties:
        status:
          type: string
        healthy:
          type: boolean
        message:
          type: string
    HealthReadyChecks:
      type: object
      required:
        - database
      properties:
        database:
          $ref: '#/components/schemas/HealthReadyCheck'
    HealthReadyData:
      type: object
      required:
        - status
        - checks
      properties:
        status:
          type: string
        checks:
          $ref: '#/components/schemas/HealthReadyChecks'
    AuthSessionData:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          minimum: 1
    UserProfileData:
      type: object
      required:
        - id
        - email
        - nickname
        - onboarding_completed
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        nickname:
          type: string
        recovery_reason:
          oneOf:
            - type: string
            - type: 'null'
        daily_checkin_time:
          oneOf:
            - type: string
              pattern: '^([01][0-9]|2[0-3]):([0-5][0-9])$'
            - type: 'null'
        onboarding_completed:
          type: boolean
    AuthResponseData:
      type: object
      required:
        - user
        - session
